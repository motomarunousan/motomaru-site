<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>写真ギャラリー｜モトマルノーサン｜梨と稲の栽培風景</title>
<meta name="description" content="モトマルノーサンの梨と稲の栽培風景・収穫の様子を集めた写真ギャラリー。埼玉県加須市の農園の日常をご覧いただけます。">
<meta name="robots" content="index, follow">
<meta name="theme-color" content="#2d4720">
<link rel="canonical" href="https://motomarunousan.github.io/motomaru-site/gallery.html">
<meta property="og:type" content="website">
<meta property="og:site_name" content="モトマルノーサン">
<meta property="og:title" content="写真ギャラリー｜モトマルノーサン">
<meta property="og:description" content="モトマルノーサンの梨と稲の栽培風景・収穫写真ギャラリー。">
<meta property="og:image" content="https://motomarunousan.github.io/motomaru-site/og-image.jpg">
<meta property="og:url" content="https://motomarunousan.github.io/motomaru-site/gallery.html">
<meta property="og:locale" content="ja_JP">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 100 100%27%3E%3Ccircle cx=%2750%27 cy=%2758%27 r=%2734%27 fill=%27%23d8a85a%27/%3E%3C/svg%3E">
<style>
    /* ===== リセット & 基本設定 ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Hiragino Mincho ProN', 'Yu Mincho', '游明朝', serif;
      color: #3a2e1e;
      background: #fffdf7;
      line-height: 1.8;
    }

    /* ===== カラーパレット ===== */
    :root {
      --green-dark:  #2d4720;   /* さらに濃く（コントラスト強化） */
      --green-mid:   #466831;   /* 濃いめに調整（淡い背景でも読めるように） */
      --green-light: #a8c880;
      --yellow:      #e8d060;
      --cream:       #fffdf7;
      --brown:       #6b4c2a;
      --text-dark:   #2a1f10;   /* 本文用：より濃い茶（可読性向上） */
      --text-mid:    #443521;   /* 補助テキスト：濃いめに */
    }

    /* ===== ナビゲーション ===== */
    header {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 1000;
      background: rgba(58, 90, 42, 0.95);
      backdrop-filter: blur(6px);
      box-shadow: 0 2px 12px rgba(0,0,0,.25);
      transition: top .2s;
    }
    nav {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 64px;
    }
    .nav-logo {
      display: inline-flex;
      align-items: center;
      text-decoration: none;
    }
    .nav-logo img {
      height: 42px;
      width: auto;
      display: block;
    }
    @media (max-width: 480px) {
      .nav-logo img { height: 34px; }
    }
    nav ul {
      display: flex;
      gap: 6px;
      list-style: none;
    }
    nav ul li a {
      color: #e8f0d8;
      text-decoration: none;
      font-size: .85rem;
      letter-spacing: .05em;
      padding: 6px 12px;
      border-radius: 4px;
      transition: background .2s, color .2s;
    }
    nav ul li a:hover {
      background: var(--green-mid);
      color: #fff;
    }

    /* ===== SNSアイコン ===== */
    .nav-left {
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .nav-sns {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .sns-link {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 34px;
      height: 34px;
      color: rgba(255,255,255,.75);
      border-radius: 50%;
      text-decoration: none;
      transition: background .2s, color .2s, transform .18s;
      flex-shrink: 0;
    }
    .sns-link:hover {
      background: rgba(255,255,255,.18);
      color: #fff;
      transform: scale(1.12);
    }
    .sns-link svg { width: 17px; height: 17px; display: block; }

    

    /* ===== ハンバーガー（スマホ用） ===== */
    .hamburger {
      display: none;
      flex-direction: column;
      gap: 5px;
      cursor: pointer;
      background: none;
      border: none;
      padding: 8px;
      width: 44px;
      height: 44px;
      align-items: center;
      justify-content: center;
      -webkit-tap-highlight-color: transparent;
      z-index: 1001;
      position: relative;
    }
    .hamburger span {
      display: block;
      width: 26px;
      height: 2.5px;
      background: #fff;
      border-radius: 2px;
      transition: transform .3s ease, opacity .25s ease;
      transform-origin: center;
    }
    /* メニューが開いているとき、ハンバーガーをXにアニメ */
    .hamburger.is-active span:nth-child(1) {
      transform: translateY(7.5px) rotate(45deg);
    }
    .hamburger.is-active span:nth-child(2) {
      opacity: 0;
    }
    .hamburger.is-active span:nth-child(3) {
      transform: translateY(-7.5px) rotate(-45deg);
    }

    /* ===== ヒーロー ===== */
    #top {
      min-height: 100vh;
      background:
        linear-gradient(160deg, rgba(58,90,42,.55) 0%, rgba(168,200,128,.25) 60%, rgba(232,208,96,.3) 100%),
        url('https://images.unsplash.com/photo-1601004890684-d8cbf643f5f2?w=1200&q=70&auto=format&fit=crop') center/cover no-repeat;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 80px 24px 60px;
    }
    .hero-badge {
      display: inline-block;
      background: var(--yellow);
      color: var(--green-dark);
      font-size: .75rem;
      font-weight: 700;
      letter-spacing: .15em;
      padding: 4px 16px;
      border-radius: 99px;
      margin-bottom: 20px;
    }
    .hero-title {
      font-size: clamp(2.4rem, 6vw, 4.2rem);
      font-weight: 900;
      color: #fff;
      text-shadow: 0 2px 16px rgba(0,0,0,.45);
      line-height: 1.25;
      margin-bottom: 16px;
    }
    .hero-title em {
      font-style: normal;
      color: var(--yellow);
    }
    .hero-sub {
      color: #ffffff;
      font-size: clamp(1rem, 2vw, 1.22rem);
      font-weight: 500;
      margin-bottom: 36px;
      text-shadow: 0 2px 10px rgba(0,0,0,.7), 0 1px 3px rgba(0,0,0,.6);
    }
    .btn-primary {
      display: inline-block;
      background: var(--yellow);
      color: var(--green-dark);
      font-weight: 700;
      font-size: 1rem;
      padding: 14px 40px;
      border-radius: 99px;
      text-decoration: none;
      box-shadow: 0 4px 18px rgba(0,0,0,.2);
      transition: transform .2s, box-shadow .2s;
    }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,.28); }
    .scroll-hint {
      position: absolute;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,.7);
      font-size: .7rem;
      letter-spacing: .2em;
      animation: bounce 2s infinite;
    }
    @keyframes bounce {
      0%,100% { transform: translateX(-50%) translateY(0); }
      50%      { transform: translateX(-50%) translateY(8px); }
    }

    /* ===== セクション共通 ===== */
    section { padding: 90px 24px; }
    .section-inner { max-width: 1000px; margin: 0 auto; }
    .section-label {
      display: inline-block;
      font-size: .78rem;
      font-weight: 800;
      letter-spacing: .2em;
      color: var(--green-dark);
      text-transform: uppercase;
      margin-bottom: 10px;
    }
    .section-title {
      font-size: clamp(1.6rem, 3.5vw, 2.4rem);
      font-weight: 900;
      color: var(--green-dark);
      margin-bottom: 16px;
      line-height: 1.3;
    }
    .section-divider {
      width: 48px;
      height: 3px;
      background: var(--yellow);
      border-radius: 2px;
      margin-bottom: 36px;
    }

    /* ===== モトマルノーサンとは ===== */
    #about { background: var(--cream); }
    .about-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 48px;
      align-items: center;
    }
    .about-img {
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(0,0,0,.15);
      position: relative;
    }
    .about-img img {
      width: 100%;
      height: auto;
      display: block;
    }
    /* 画像編集オーバーレイ */
    .img-edit-overlay {
      display: none;
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,.5);
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 2;
    }
    .img-edit-overlay span {
      background: #fff;
      color: var(--green-dark);
      border-radius: 99px;
      padding: 9px 22px;
      font-size: .85rem;
      font-weight: 700;
      box-shadow: 0 2px 10px rgba(0,0,0,.2);
      pointer-events: none;
    }
    .about-text p { color: var(--text-dark); margin-bottom: 14px; font-size: 1rem; line-height: 2; }
    .about-facts {
      display: flex;
      gap: 24px;
      margin-top: 28px;
      flex-wrap: wrap;
    }
    .fact-card {
      background: #f0f7e4;
      border-left: 4px solid var(--green-light);
      padding: 12px 18px;
      border-radius: 0 8px 8px 0;
      flex: 1;
      min-width: 110px;
    }
    .fact-card .fact-num { font-size: 1.6rem; font-weight: 900; color: var(--green-dark); }
    .fact-card .fact-lbl { font-size: .78rem; color: var(--text-dark); font-weight: 600; }

    /* ===== スタッフ紹介 ===== */
    #staff { background: #fff; }
    .staff-intro {
      color: var(--text-dark);
      font-size: 1rem;
      line-height: 2;
      margin: 0 0 40px;
      max-width: 720px;
    }
    .staff-grid {
      display: flex;
      flex-direction: column;
      gap: 30px;
    }
    .staff-card {
      display: flex;
      background: var(--cream);
      border: 1.5px solid rgba(168, 200, 128, 0.45);
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 6px 22px rgba(0, 0, 0, 0.07);
      transition: transform .2s, box-shadow .2s;
      min-height: 300px;
    }
    .staff-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 14px 32px rgba(0, 0, 0, 0.12);
    }
    .staff-card-reverse { flex-direction: row-reverse; }
    .staff-photo {
      position: relative;
      flex: 0 0 38%;
      max-width: 360px;
      overflow: hidden;
      background: #eef2e3;
    }
    .staff-photo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center 28%;
      display: block;
    }
    .staff-body {
      flex: 1;
      padding: 36px 38px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    .staff-body-duo .staff-person + .staff-person {
      margin-top: 24px;
      padding-top: 24px;
      border-top: 1.5px dashed rgba(168, 200, 128, 0.75);
    }
    .staff-role {
      display: inline-block;
      align-self: flex-start;
      background: var(--green-dark);
      color: #fff;
      font-size: .76rem;
      font-weight: 700;
      letter-spacing: .03em;
      padding: 5px 14px;
      border-radius: 99px;
      margin-bottom: 12px;
    }
    .staff-name {
      font-size: clamp(1.4rem, 3vw, 1.9rem);
      font-weight: 900;
      color: var(--green-dark);
      line-height: 1.3;
      margin-bottom: 12px;
    }
    .staff-bio {
      color: var(--text-dark);
      font-size: .96rem;
      line-height: 2;
    }
    @media (max-width: 768px) {
      .staff-card,
      .staff-card-reverse { flex-direction: column; }
      .staff-photo {
        flex: none;
        width: 100%;
        max-width: 100%;
        aspect-ratio: 1 / 1;
      }
      .staff-body { padding: 26px 22px; }
    }

    /* ===== 品種・収穫時期 ===== */
    #variety { background: #f5f9ee; }
    .variety-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 24px;
    }
    .variety-card {
      background: #fff;
      border-radius: 14px;
      padding: 28px 20px;
      text-align: center;
      box-shadow: 0 4px 16px rgba(0,0,0,.07);
      transition: transform .2s, box-shadow .2s;
      position: relative;
      overflow: hidden;
    }
    .variety-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 5px;
      background: var(--green-light);
    }
    .variety-card:hover { transform: translateY(-4px); box-shadow: 0 10px 28px rgba(0,0,0,.12); }
    .variety-icon {
      width: 78px;
      height: 78px;
      margin: 0 auto 12px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .variety-icon svg.nashi-icon {
      width: 100%;
      height: 100%;
      display: block;
      filter: drop-shadow(0 2px 4px rgba(120,80,30,.18));
      transition: transform .25s;
    }
    .variety-card:hover .variety-icon svg.nashi-icon {
      transform: rotate(-4deg) scale(1.06);
    }
    .variety-name { font-size: 1.1rem; font-weight: 900; color: var(--green-dark); margin-bottom: 6px; }
    .variety-period {
      display: inline-block;
      background: var(--yellow);
      color: var(--green-dark);
      font-size: .72rem;
      font-weight: 700;
      padding: 3px 12px;
      border-radius: 99px;
      margin-bottom: 10px;
    }
    .variety-desc { font-size: .88rem; color: var(--text-dark); line-height: 1.75; }

    /* ===== 料金 ===== */
    #pricing { background: var(--cream); }
    .pricing-intro {
      color: var(--text-dark);
      font-size: 1rem;
      line-height: 1.95;
      margin-bottom: 36px;
      max-width: 720px;
    }
    .pricing-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 24px;
    }
    .pricing-card {
      background: #fff;
      border-radius: 14px;
      padding: 28px 26px 24px;
      box-shadow: 0 4px 16px rgba(0,0,0,.07);
      position: relative;
      transition: transform .2s, box-shadow .2s;
      border: 1.5px solid transparent;
    }
    .pricing-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 26px rgba(0,0,0,.11);
    }
    .pricing-card.pricing-gift {
      border-color: rgba(232, 208, 96, 0.4);
    }
    .pricing-card.pricing-home {
      border-color: rgba(168, 200, 128, 0.5);
    }
    .pricing-badge {
      display: inline-block;
      font-size: .72rem;
      font-weight: 800;
      letter-spacing: .12em;
      padding: 4px 14px;
      border-radius: 99px;
      margin-bottom: 14px;
    }
    .pricing-badge-gift {
      background: var(--yellow);
      color: var(--green-dark);
    }
    .pricing-badge-home {
      background: var(--green-light);
      color: var(--green-dark);
    }
    .pricing-title {
      font-size: 1.35rem;
      font-weight: 900;
      color: var(--green-dark);
      margin-bottom: 10px;
      letter-spacing: .02em;
    }
    .pricing-content {
      font-size: .85rem;
      color: var(--text-mid);
      line-height: 1.7;
      margin-bottom: 18px;
      padding-bottom: 16px;
      border-bottom: 1px dashed #d8d2b8;
    }
    .pricing-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }
    .pricing-list li {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      padding: 10px 4px;
      border-bottom: 1px solid #f0ecd8;
    }
    .pricing-list li:last-child { border-bottom: none; }
    .pricing-size {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 44px;
      height: 28px;
      padding: 0 10px;
      background: #f5f1e0;
      color: var(--green-dark);
      font-weight: 800;
      font-size: .9rem;
      border-radius: 6px;
      letter-spacing: .04em;
    }
    .pricing-price {
      font-size: 1.55rem;
      font-weight: 900;
      color: var(--text-dark);
      letter-spacing: .01em;
    }
    .pricing-price small {
      font-size: .8rem;
      font-weight: 700;
      color: var(--text-mid);
      margin-left: 3px;
    }
    .pricing-note {
      margin-top: 36px;
      padding: 16px 20px;
      background: #f0f7e4;
      border-radius: 10px;
      font-size: .85rem;
      color: var(--text-dark);
      line-height: 1.85;
    }
    @media (max-width: 768px) {
      .pricing-grid { grid-template-columns: 1fr; gap: 18px; }
      .pricing-title { font-size: 1.2rem; }
      .pricing-price { font-size: 1.4rem; }
    }

    /* ===== お米のご紹介 ===== */
    #rice { background: #fff; }
    .rice-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 44px;
      align-items: center;
      margin-bottom: 40px;
    }
    .rice-img {
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 8px 30px rgba(0,0,0,.15);
      position: relative;
    }
    .rice-img img { width: 100%; height: auto; display: block; }
    .rice-text p { color: var(--text-dark); margin-bottom: 14px; font-size: 1rem; line-height: 2; }
    .rice-banner {
      position: relative;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 6px 22px rgba(0,0,0,.12);
      margin-bottom: 46px;
    }
    .rice-banner img {
      width: 100%;
      height: 300px;
      object-fit: cover;
      object-position: center 56%;
      display: block;
    }
    .rice-subtitle {
      font-size: 1.15rem;
      font-weight: 900;
      color: var(--green-dark);
      margin-bottom: 22px;
      padding-left: 14px;
      border-left: 4px solid var(--yellow);
    }
    .rice-variety-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
      gap: 22px;
      margin-bottom: 46px;
    }
    .rice-variety-card {
      background: var(--cream);
      border: 1.5px solid rgba(168,200,128,.45);
      border-radius: 14px;
      padding: 26px 22px;
      text-align: center;
      transition: transform .2s, box-shadow .2s;
    }
    .rice-variety-card:hover { transform: translateY(-4px); box-shadow: 0 10px 26px rgba(0,0,0,.1); }
    .rice-icon { width: 64px; height: auto; margin: 0 auto 10px; display: block; }
    .rice-variety-name { font-size: 1.1rem; font-weight: 900; color: var(--green-dark); margin-bottom: 8px; }
    .rice-variety-desc { font-size: .88rem; color: var(--text-dark); line-height: 1.8; }
    .rice-info {
      display: flex;
      gap: 18px;
      flex-wrap: wrap;
    }
    .rice-info-card {
      flex: 1;
      min-width: 180px;
      background: #f0f7e4;
      border-radius: 12px;
      padding: 18px 20px;
      text-align: center;
    }
    .rice-info-label { font-size: .75rem; font-weight: 800; color: var(--green-mid); letter-spacing: .08em; margin-bottom: 6px; }
    .rice-info-value { font-size: 1rem; font-weight: 800; color: var(--green-dark); line-height: 1.65; }
    @media (max-width: 768px) {
      .rice-grid { grid-template-columns: 1fr; gap: 26px; }
      .rice-img { order: -1; }
      .rice-banner img { height: 200px; }
      .rice-info { gap: 12px; }
    }

    /* ===== 料金グループ見出し & お米料金 ===== */
    .pricing-group-title {
      font-size: 1.2rem;
      font-weight: 900;
      color: var(--green-dark);
      margin: 0 0 18px;
      padding-left: 14px;
      border-left: 4px solid var(--yellow);
    }
    .pricing-group-title.is-rice { margin-top: 44px; }
    .rice-price-panel {
      background: #fff;
      border: 1.5px solid rgba(168,200,128,.5);
      border-radius: 14px;
      padding: 26px 28px;
      box-shadow: 0 4px 16px rgba(0,0,0,.07);
    }
    .rice-price-panel p { color: var(--text-dark); font-size: .95rem; line-height: 1.95; margin-bottom: 8px; }
    .rice-price-options {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin: 16px 0 20px;
    }
    .rice-price-tag {
      background: #f5f1e0;
      color: var(--green-dark);
      font-weight: 800;
      font-size: .85rem;
      padding: 6px 14px;
      border-radius: 8px;
    }
    .rice-price-cta {
      display: inline-block;
      background: var(--green-dark);
      color: #fff;
      font-weight: 800;
      font-size: .95rem;
      padding: 11px 30px;
      border-radius: 99px;
      text-decoration: none;
      transition: background .2s;
    }
    .rice-price-cta:hover { background: var(--green-mid); }

    /* ===== 収穫カレンダー ===== */
    #calendar { background: var(--cream); }
    .calendar-wrapper { overflow-x: auto; }
    .harvest-calendar {
      width: 100%;
      min-width: 600px;
      border-collapse: collapse;
      font-size: .85rem;

      font-weight: 700;

    }
    .harvest-calendar tbody th {
      background: #f0f7e4;
      color: var(--green-dark);

      text-align: left;
      padding-left: 14px;
      white-space: nowrap;
    }
    /* 縞模様は空セルにだけ適用（.season / .peak の塗りつぶしを邪魔しない） */

      color: var(--green-dark);
      font-size: .7rem;
      font-weight: 800;

    .harvest-calendar tbody td.peak {

      border-radius: 4px;
      color: var(--brown);

      font-weight: 800;
    }
    .calendar-legend {

      gap: 20px;
      margin-top: 16px;
      flex-wrap: wrap;

    .legend-item { display: flex; align-items: center; gap: 7px; }
    .legend-box { width: 20px; height: 14px; border-radius: 3px; }
    .legend-green { background: var(--green-light); }
    .legend-yellow { background: var(--yellow); }

    /* 営業日カレンダー */
    .open-calendar-wrap {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 28px;
      margin-top: 8px;
    }
    .month-block {
      background: #fff;
      border-radius: 14px;
      padding: 20px;
      box-shadow: 0 4px 14px rgba(0,0,0,.07);
    }
    .month-block h3 {
      font-size: 1rem;
      font-weight: 900;
      color: var(--green-dark);
      margin-bottom: 12px;
      text-align: center;
      letter-spacing: .05em;
    }
    .mini-cal {
      width: 100%;
      border-collapse: collapse;
      font-size: .8rem;
    }
    .mini-cal th {
      color: var(--green-mid);
      font-weight: 700;
      padding: 4px 0;
      text-align: center;
    }
    .mini-cal th.sun { color: #cc4444; }
    .mini-cal th.sat { color: #3366aa; }
    .mini-cal td {
      text-align: center;
      padding: 5px 2px;
      border-radius: 50%;
      cursor: default;
      width: 32px;
      height: 32px;
      font-size: .82rem;
    }
    .mini-cal td.peak-open {
      background: var(--yellow);
      color: var(--brown);
      font-weight: 800;

      background: #d8d2c4;
      color: #6a6258;

      border-radius: 50%;

      text-decoration-thickness: 1.5px;
      text-decoration-color: #a89d8a;

    /* 旧 .open は後方互換のため残し、視覚は default と同じに */
    .mini-cal td.open { background: transparent; color: inherit; font-weight: inherit; }
    .mini-cal td.closed { color: #ccc; }
    .mini-cal td.sun-day { color: #cc4444; }
    .mini-cal td.sat-day { color: #3366aa; }

    /* 営業日カレンダー凡例（常に表示） */
    .open-cal-legend {
      margin-top: 28px;
      padding: 18px 22px;
      background: #f7f4e8;
      border: 1.5px solid #e0d8b8;
      border-radius: 10px;
      display: flex;
      flex-wrap: wrap;
      gap: 22px 32px;
      justify-content: center;
      align-items: center;

      color: var(--text-dark);
    }
    .open-cal-legend .legend-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .open-cal-legend .legend-circle {

      height: 30px;
      border-radius: 50%;

      align-items: center;

      font-weight: 800;

    .open-cal-legend .legend-peak {

    }
    .open-cal-legend .legend-closed {
      background: #d8d2c4;
      color: #6a6258;

      text-decoration-thickness: 1.5px;

    }

    .open-note {

      line-height: 1.9;
    }

    /* ===== アクセス ===== */
    #access { background: #f5f9ee; }

      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 40px;
      align-items: start;

    .access-info dt {

    .access-info dd { color: var(--text-dark); font-size: .98rem; }
    .access-info dd a { color: var(--green-dark); text-decoration: underline; font-weight: 600; }
    .map-area { position: relative; }
    .map-edit-btn {
      display: none;

      padding: 9px;
      background: #fff;
      color: var(--green-dark);

      font-weight: 700;
      font-family: inherit;

    }
    .map-edit-btn:hover { background: #f0f7e4; }
    .map-wrap {

      overflow: hidden;
      box-shadow: 0 6px 24px rgba(0,0,0,.12);

    }
    .map-wrap iframe { width: 100%; height: 100%; border: none; display: block; }

    /* ===== お問い合わせ ===== */
    #contact { background: var(--cream); }
    .contact-grid {
      max-width: 620px;
      margin: 0 auto;
    }
    .contact-info p { color: var(--text-dark); font-size: .98rem; margin-bottom: 20px; line-height: 1.85; }
    .contact-detail {
      background: #f0f7e4;
      border-radius: 10px;
      padding: 20px 22px;
      margin-top: 16px;
    }
    .contact-detail p { margin-bottom: 8px; font-size: .88rem; }
    .contact-detail span { font-size: 1.3rem; font-weight: 900; color: var(--green-dark); }

    /* お問い合わせフォーム（おすすめ）の枠を少し強調 */
    .contact-detail-form {
      background: #fdf7d6;
      border: 1.5px solid var(--yellow);
      box-shadow: 0 3px 12px rgba(232,208,96,.18);
    }
    .contact-recommend {
      display: inline-block;
      background: var(--yellow);
      color: var(--green-dark);
      font-size: .68rem !important;
      font-weight: 800 !important;
      letter-spacing: .08em;
      padding: 2px 10px;
      border-radius: 99px;
      margin-left: 8px;
      vertical-align: 2px;
    }
    /* フォームへのリンク（電話番号と同じくらいの存在感） */
    .contact-form-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 1.15rem;
      font-weight: 900;
      color: var(--green-dark);
      text-decoration: none;
      padding: 4px 0;
      border-bottom: 3px solid var(--yellow);
      transition: color .18s, border-color .18s, gap .18s;
    }
    .contact-form-link::after {
      content: "→";
      font-size: 1rem;
      transition: transform .2s;
    }
    .contact-form-link:hover,
    .contact-form-link:focus {
      color: var(--green-mid);
      border-color: var(--green-mid);
      outline: none;
    }
    .contact-form-link:hover::after,
    .contact-form-link:focus::after {
      transform: translateX(4px);
    }
    /* メールアドレスのリンク（電話番号と並ぶ存在感） */
    .contact-mail-link {
      display: inline-block;
      font-size: 1rem;
      font-weight: 800;
      color: var(--green-dark);
      text-decoration: none;
      border-bottom: 2px solid rgba(58, 90, 42, 0.25);
      padding-bottom: 1px;
      transition: color .15s, border-color .15s;
      word-break: break-all;
    }
    .contact-mail-link:hover,
    .contact-mail-link:focus {
      color: var(--green-mid);
      border-color: var(--green-mid);
      outline: none;
    }


    /* ===== フッター ===== */
    footer {
      background: var(--green-dark);
      color: #b8d090;
      text-align: center;
      padding: 36px 24px;
      font-size: .8rem;
      line-height: 2;
    }
    footer a { color: var(--yellow); text-decoration: none; }
    footer .footer-name { font-size: 1.05rem; font-weight: 700; color: #fff; margin-bottom: 6px; }

    /* ===== レスポンシブ ===== */
    @media (max-width: 768px) {
      .hamburger { display: flex; }
      nav ul#nav-menu {
        position: fixed;
        top: 64px;
        left: 0;
        right: 0;
        flex-direction: column;
        background: rgba(40, 70, 28, 0.98);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        padding: 12px 0 24px;
        gap: 0;
        max-height: 0;
        overflow: hidden;
        opacity: 0;
        pointer-events: none;
        visibility: hidden;
        transition: max-height .35s ease, opacity .25s ease, visibility 0s linear .35s;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.25);
        z-index: 999;
        display: flex;
      }
      nav ul#nav-menu.open {
        max-height: calc(100vh - 64px);
        overflow-y: auto;
        opacity: 1;
        pointer-events: auto;
        visibility: visible;
        transition: max-height .35s ease, opacity .25s ease, visibility 0s linear 0s;
      }
      body.edit-mode nav ul#nav-menu { top: 98px; }
      nav ul#nav-menu li {
        width: 100%;
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      }
      nav ul#nav-menu li:last-child { border-bottom: none; }
      nav ul#nav-menu li a {
        display: block;
        padding: 16px 28px;
        font-size: 1rem;
        color: #f4faea;
        letter-spacing: .04em;
      }
      nav ul#nav-menu li a:hover,
      nav ul#nav-menu li a:active {
        background: rgba(255, 255, 255, 0.08);
        color: #fff;
      }
      .about-grid,
      .access-grid,
      .contact-grid { grid-template-columns: 1fr; }
      .about-img { order: -1; }

    /* ============================================
       スマホ用：下部固定CTAバー
    ============================================ */
    #mobile-cta-bar { display: none; }

    @media (max-width: 768px) {
      #mobile-cta-bar {
        display: flex;
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        z-index: 950;
        background: rgba(255, 253, 247, 0.96);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        border-top: 1.5px solid #e0d8b8;
        box-shadow: 0 -6px 22px rgba(0, 0, 0, 0.10);
        padding: 9px 10px calc(9px + env(safe-area-inset-bottom)) 10px;
        gap: 8px;
        transform: translateY(120%);
        transition: transform .35s cubic-bezier(.22, .9, .36, 1);
        pointer-events: none;
      }
      #mobile-cta-bar.visible {
        transform: translateY(0);
        pointer-events: auto;
      }
      .mobile-cta {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 7px;
        padding: 13px 6px;
        border-radius: 99px;
        text-decoration: none;
        font-weight: 800;
        font-size: .92rem;
        letter-spacing: .04em;
        white-space: nowrap;
        transition: transform .15s, box-shadow .2s, background .2s;
        -webkit-tap-highlight-color: transparent;
      }
      .mobile-cta:active { transform: scale(.97); }
      .mobile-cta .cta-icon {
        font-size: 1.08rem;
        line-height: 1;
      }
      .mobile-cta-tel {
        background: #fff;
        color: var(--green-dark);

        flex: 0 0 44%;
      }
      .mobile-cta-form {
        background: var(--green-dark);
        color: #fff;
        box-shadow: 0 4px 14px rgba(58, 90, 42, 0.28);
      }
      .mobile-cta-form:active {
        background: var(--green-mid);
      }
      /* バー表示中は本文の最下部に余白を追加（コンテンツが隠れないように） */
      body.has-mobile-cta {
        padding-bottom: 78px;
      }

    /* セクション間に表示される「+ 追加」ボタン */
    .section-insert-wrap {

      align-items: center;
      justify-content: center;
      max-width: 1100px;
      margin: 0 auto;
      padding: 28px 24px;
    }
    body.edit-mode .section-insert-wrap { display: flex; }
    .section-insert-wrap::before,
    .section-insert-wrap::after {
      content: "";
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(90,128,64,.45), transparent);
    }
    .section-insert-btn {
      margin: 0 16px;
      padding: 11px 26px;
      background: #fff;
      color: var(--green-dark);
      border: 2px dashed var(--green-mid);
      border-radius: 99px;
      font-family: inherit;
      font-size: .88rem;
      font-weight: 700;
      letter-spacing: .04em;

    .section-insert-btn:hover {

    /* ユーザー追加セクション本体 */

    .section-delete-btn {

      top: 22px;
      right: 22px;
      width: 40px;
      height: 40px;

      color: #fff;
      border: none;
      border-radius: 50%;

    /* 画像+テキスト2カラムレイアウト */

      align-items: center;

       セクション追加モーダル
    ============================================ */
    #section-add-modal {

      inset: 0;

      width: 100%;

<script>
// ハンバーガーメニュー
(function() {
  var h = document.getElementById('hamburger');
  var m = document.getElementById('nav-menu');
  if (h && m) {
    h.addEventListener('click', function() {
      m.classList.toggle('open');
      h.setAttribute('aria-expanded', m.classList.contains('open') ? 'true' : 'false');
    });
  }
})();

// ========== ライトボックス（画像拡大） ==========
(function() {
  var lb = document.getElementById('lightbox');
  if (!lb) return;
  var lbImg = document.getElementById('lightbox-img');
  document.addEventListener('click', function(e) {
    if (e.target && e.target.matches && e.target.matches('.gallery img')) {
      lbImg.src = e.target.src;
      lbImg.alt = e.target.alt || '';
      lb.classList.add('open');
      lb.setAttribute('aria-hidden', 'false');
      document.body.style.overflow = 'hidden';
    }
  });
  function closeLb() {
    lb.classList.remove('open');
    lb.setAttribute('aria-hidden', 'true');
    document.body.style.overflow = '';
  }
  lb.addEventListener('click', closeLb);
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape' && lb.classList.contains('open')) closeLb();
  });
})();

// ========== ギャラリー自動読み込み ==========
(function() {
  async function checkExists(src) {
    try {
      var r = await fetch(src, { method: 'HEAD' });
      return r.ok;
    } catch (e) {
      return await new Promise(function(resolve) {
        var img = new Image();
        img.onload = function() { resolve(true); };
        img.onerror = function() { resolve(false); };
        img.src = src;
      });
    }
  }

  async function detectCount(kind, maxSearch) {
    var count = 0;
    for (var i = 1; i <= maxSearch; i++) {
      var num = String(i).padStart(2, '0');
      var src = 'photos-' + kind + '/' + kind + '-' + num + '.jpg';
      var ok = await checkExists(src);
      if (!ok) break;
      count = i;
    }
    return count;
  }

  async function loadGalleries() {
    var galleries = document.querySelectorAll('.gallery[data-gallery-auto]');
    var totals = {};
    for (var g = 0; g < galleries.length; g++) {
      var gallery = galleries[g];
      var kind = gallery.dataset.galleryAuto;
      if (totals[kind] === undefined) {
        totals[kind] = await detectCount(kind, 100);
      }
      var total = totals[kind];
      var limit = parseInt(gallery.dataset.galleryLimit) || Infinity;
      var showCount = Math.min(limit, total);
      var label = kind === 'nashi' ? '梨' : '稲';
      gallery.innerHTML = '';
      for (var i = 0; i < showCount; i++) {
        var actualNum = total - i;
        var num = String(actualNum).padStart(2, '0');
        var img = document.createElement('img');
        img.src = 'photos-' + kind + '/' + kind + '-' + num + '.jpg';
        img.alt = label + 'の写真 ' + actualNum;
        img.loading = 'lazy';
        img.decoding = 'async';
        gallery.appendChild(img);
      }
    }
    document.querySelectorAll('.gallery-more[data-more-for]').forEach(function(more) {
      var kind = more.dataset.moreFor;
      var total = totals[kind] || 0;
      var totalSpan = more.querySelector('[data-more-total]');
      if (totalSpan) totalSpan.textContent = total;
      var gallery = document.querySelector('.gallery[data-gallery-auto="' + kind + '"]');
      var limit = gallery ? (parseInt(gallery.dataset.galleryLimit) || Infinity) : Infinity;
      more.style.display = total > limit ? '' : 'none';
    });
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', loadGalleries);
  } else {
    loadGalleries();
  }
})();
</script>
